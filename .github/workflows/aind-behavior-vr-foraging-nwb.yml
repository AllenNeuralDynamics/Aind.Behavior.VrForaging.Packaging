name: aind-behavior-vr-foraging-nwb test suite

on:
  pull_request:
  push:
    branches:
      - main
      - dev*
      - release*
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  # ╔──────────────────────────╗
  # │   _____         _        │
  # │  |_   _|__  ___| |_ ___  │
  # │    | |/ _ \/ __| __/ __| │
  # │    | |  __/\__ \ |_\__ \ │
  # │    |_|\___||___/\__|___/ │
  # │                          │
  # ╚──────────────────────────╝
  tests:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [ "3.11", "3.12", "3.13" ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install python dependencies
        run: uv sync

      - name: Run ruff format
        run: uv run ruff format --check

      - name: Run ruff check
        run: uv run ruff check

      - name: Run codespell
        run: uv run codespell --check-filenames

      - name: Run ty
        run: uv run ty check

      - name: Run pytest
        run: uv run pytest

      - name: Build
        run: uv build

  # ╔─────────────────────────────────────────────────╗
  # │   ___       _                        _   _              │
  # │  |_ _|_ __ | |_ ___  __ _ _ __ __ _| |_(_) ___  _ __  │
  # │   | || '_ \| __/ _ \/ _` | '__/ _` | __| |/ _ \| '_ \ │
  # │   | || | | | ||  __/ (_| | | | (_| | |_| | (_) | | | |│
  # │  |___|_| |_|\__\___|\__, |_|  \__,_|\__|_|\___/|_| |_| │
  # │                     |___/                               │
  # ╚─────────────────────────────────────────────────────────╝

  integration-tests:
    name: Integration tests (S3 datasets)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-integration')) ||
      (github.event_name == 'release' && github.event.action == 'published')

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install python dependencies
        run: uv sync

      - name: Restore integration data cache
        uses: actions/cache@v4
        with:
          path: tests/integration/.cache
          key: integration-data-${{ hashFiles('tests/integration/datasets.yml') }}
          restore-keys: |
            integration-data-

      - name: Run integration tests
        run: uv run pytest -m integration --tb=short

  # ╔─────────────────────────────────────────────────────────────────╗
  # │   ____        _     _ _        ____      _                      │
  # │  |  _ \ _   _| |__ | (_) ___  |  _ \ ___| | ___  __ _ ___  ___  │
  # │  | |_) | | | | '_ \| | |/ __| | |_) / _ \ |/ _ \/ _` / __|/ _ \ │
  # │  |  __/| |_| | |_) | | | (__  |  _ <  __/ |  __/ (_| \__ \  __/ │
  # │  |_|    \__,_|_.__/|_|_|\___| |_| \_\___|_|\___|\__,_|___/\___| │
  # │                                                                 │
  # ╚─────────────────────────────────────────────────────────────────╝

  prepare-release:
    runs-on: ubuntu-latest
    name: Set version from release tag
    needs: [tests, integration-tests]
    if: github.event_name == 'release' && github.event.action == 'published'
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          version=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Setting version to: $version"

      - name: Validate version format
        run: uv version ${{ steps.get_version.outputs.version }} --dry-run

      - name: Set version
        run: uv version ${{ steps.get_version.outputs.version }}

      - name: Build
        run: uv build

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Commit version changes
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Set version ${{ steps.get_version.outputs.version }} [skip ci]"
          git push origin main
          git tag -fa "${{ github.event.release.tag_name }}" -m "${{ github.event.release.tag_name }}"
          git push origin "${{ github.event.release.tag_name }}" --force

  # ╔───────────────────────────────────────╗
  # │   ____        ____  ____  _           │
  # │  |  _ \ _   _|  _ \|  _ \(_)          │
  # │  | |_) | | | | |_) | |_) | |          │
  # │  |  __/| |_| |  __/|  __/| |          │
  # │  |_|    \__, |_|   |_|   |_|          │
  # │          |___/  (disabled)            │
